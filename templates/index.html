<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGIML Interface</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>NGIML</h1>
    </section>

    <section class="panel">
      {% if not checkpoints %}
      <div class="message error">
        No checkpoints were found in <code>checkpoints/</code>. Add the expected checkpoint files and refresh.
      </div>
      {% endif %}

      <form action="/predict" method="post" enctype="multipart/form-data" class="form" data-predict-form>
        <label class="field">
          <span>Checkpoint</span>
          <select name="checkpoint" {% if not checkpoints %}disabled{% endif %}>
            {% for checkpoint in checkpoints %}
            <option value="{{ checkpoint.value }}" {% if checkpoint.value == selected_checkpoint %}selected{% endif %}>{{ checkpoint.label }}</option>
            {% endfor %}
          </select>
        </label>

        <label class="field">
          <span>Image</span>
          <input type="file" name="image" accept="image/png,image/jpeg,image/jpg,image/bmp,image/tiff,image/webp" required {% if not checkpoints %}disabled{% endif %}>
        </label>

        <button type="submit" class="button" data-submit-button {% if not checkpoints %}disabled{% endif %}>Run Inference</button>
      </form>
    </section>

    <section id="result-container" class="result-container" aria-live="polite">
      <div class="panel result-summary is-empty" data-result-panel>
        <div class="result-header">
          <p class="eyebrow">Result</p>
          <h2 data-result-title>Waiting for prediction</h2>
        </div>
        <div class="message error no-margin hidden" data-result-error></div>
        <div class="preview-surface">
          <div class="preview-grid">
            <article class="preview-tile">
              <h3>Input</h3>
              <div class="preview-placeholder" data-preview-placeholder="input">No image yet</div>
              <img class="preview-image hidden" data-preview-image="input" alt="Input preview">
            </article>
            <article class="preview-tile">
              <h3>Prediction</h3>
              <div class="preview-placeholder" data-preview-placeholder="prediction">No prediction yet</div>
              <img class="preview-image hidden" data-preview-image="prediction" alt="Probability map">
            </article>
            <article class="preview-tile">
              <h3>Binary Mask</h3>
              <div class="preview-placeholder" data-preview-placeholder="binary">No mask yet</div>
              <img class="preview-image hidden" data-preview-image="binary" alt="Binary mask">
            </article>
            <article class="preview-tile">
              <h3>Overlay</h3>
              <div class="preview-placeholder" data-preview-placeholder="overlay">No overlay yet</div>
              <img class="preview-image hidden" data-preview-image="overlay" alt="Overlay result">
            </article>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
